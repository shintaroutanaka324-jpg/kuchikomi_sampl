<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新しいパスワードの設定 | カウマエ</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-auth">
  <div id="site-header"></div>
  <div id="breadcrumb"></div>

  <main class="page-content">
    <div class="auth-card">
      <h1>新しいパスワードの設定</h1>
      <p class="subtitle">新しいパスワードを入力してください</p>
      <form id="reset-form">
        <div class="form-group">
          <label class="form-label" for="password">新しいパスワード</label>
          <input type="password" class="form-input" id="password" required minlength="8" placeholder="8文字以上" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label class="form-label" for="passwordConfirm">新しいパスワード（確認）</label>
          <input type="password" class="form-input" id="passwordConfirm" required placeholder="••••••••" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-trust btn-block btn-lg" id="reset-submit">パスワードを更新</button>
      </form>
      <p class="auth-footer">
        <a href="login.html">ログインに戻る</a>
      </p>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await App.whenReady();

      App.renderBreadcrumb([
        { label: "トップ", path: "index.html" },
        { label: "パスワード設定" },
      ]);

      const form = document.getElementById("reset-form");
      const submitBtn = document.getElementById("reset-submit");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const pw = document.getElementById("password").value;
        const pw2 = document.getElementById("passwordConfirm").value;
        if (pw !== pw2) {
          App.showToast("パスワードが一致しません", "error");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "更新中...";

        try {
          await Auth.updatePassword(pw);
          App.showToast("パスワードを更新しました");
          setTimeout(() => (window.location.href = "login.html"), 800);
        } catch (err) {
          App.showToast(err.message || "更新に失敗しました。リンクの有効期限が切れている可能性があります。", "error");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "パスワードを更新";
        }
      });
    });
  </script>
</body>
</html>
