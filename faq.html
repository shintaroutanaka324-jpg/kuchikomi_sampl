<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q&A | カウマエ</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header"></div>
  <div id="breadcrumb"></div>

  <main class="page-content">
    <div class="container">
      <div class="page-inner page-inner--medium">
      <div class="page-header text-center">
        <h1>❓ よくある質問</h1>
        <p style="color:var(--gray-600)">カウマエに関するよくある質問をまとめました</p>
      </div>

      <div id="faq-list"></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const FAQ_ITEMS = [
      {
        q: "どんなサービスの口コミが載っていますか？",
        a: "オンライン講座、コーチング、情報商材、SNS発信者の商品、オンラインサロン、恋愛コンサル、副業スクールなどが対象です。",
      },
      {
        q: "口コミを閲覧するにはどうすればよいですか？",
        a: "口コミの全文閲覧には、口コミを1件投稿する（無料・1か月閲覧）、または月額880円プランをお申し込みいただく方法があります。詳細は料金プランページをご覧ください。",
      },
      {
        q: "口コミの投稿は匿名でできますか？",
        a: "はい、口コミの投稿は匿名で行うことができます。個人情報が公開されることはありませんので、安心してご利用ください。",
      },
      {
        q: "口コミを投稿した後、編集や削除はできますか？",
        a: "投稿後の口コミは編集・削除が可能です。マイページから投稿履歴を確認し、編集または削除を行うことができます。",
      },
      {
        q: "購入証明済みなどのバッジとは？",
        a: "購入証明の提出は任意です。領収書・決済画面などを提出いただいた口コミに「購入証明済み」バッジが付きます。本人確認などの追加認証はありません。購入証明はモザイク処理され、個人情報は公開されません。バッジのない口コミも掲載されます。",
        id: "badges",
      },
      {
        q: "サービスの利用に料金はかかりますか？",
        a: "無料プランでは、星評価（総合評価）の確認や検索、口コミの一部プレビューなどが利用できます。すべての口コミの全文を読むには、口コミ投稿（無料）または月額880円のプランが必要です。",
      },
      {
        q: "口コミの信頼性はどのように担保されていますか？",
        a: "すべての口コミに購入記録の提出を義務づけているわけではありません。購入記録を提出いただいた口コミにはバッジで目印を付け、比較検討の参考にしていただけます。不適切な投稿は運営が確認のうえ削除する場合があります。",
      },
      {
        q: "アカウントを削除したい場合はどうすればよいですか？",
        a: "アカウント設定ページから「アカウント削除」を選択していただくか、お問い合わせフォームからご連絡ください。",
      },
      {
        q: "口コミ投稿時に注意すべきことはありますか？",
        a: "個人情報の記載、誹謗中傷、虚偽の情報、著作権を侵害する内容の投稿は禁止されています。具体的で建設的な口コミをお願いします。",
      },
    ];

    document.addEventListener("DOMContentLoaded", () => {
      App.renderBreadcrumb([
        { label: "トップ", path: "index.html" },
        { label: "Q&A" },
      ]);

      document.getElementById("faq-list").innerHTML = FAQ_ITEMS.map(
        (item) => `
        <div class="faq-item"${item.id ? ` id="${item.id}"` : ""}>
          <button type="button" class="faq-question">
            <span style="display:flex;gap:0.75rem;align-items:flex-start;text-align:left">
              <span class="faq-q-badge">Q</span>
              ${App.escapeHtml(item.q)}
            </span>
            <span class="faq-chevron">▼</span>
          </button>
          <div class="faq-answer" style="padding-left:2.25rem">${App.escapeHtml(item.a)}</div>
        </div>`
      ).join("");

      App.initFaqAccordion(".faq-question");
    });
  </script>
</body>
</html>
