<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パスワード再設定 | カウマエ</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-auth">
  <div id="site-header"></div>
  <div id="breadcrumb"></div>

  <main class="page-content">
    <div class="auth-card">
      <h1>パスワード再設定</h1>
      <p class="subtitle">登録したメールアドレスに、パスワード再設定用のリンクをお送りします</p>
      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label" for="email">メールアドレス</label>
          <input type="email" class="form-input" id="email" required placeholder="example@email.com" autocomplete="email" />
        </div>
        <button type="submit" class="btn btn-trust btn-block btn-lg" id="forgot-submit">再設定メールを送信</button>
      </form>
      <p class="auth-footer">
        <a href="login.html">ログインに戻る</a>
      </p>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await App.whenReady();

      App.renderBreadcrumb([
        { label: "トップ", path: "index.html" },
        { label: "パスワード再設定" },
      ]);

      const form = document.getElementById("forgot-form");
      const submitBtn = document.getElementById("forgot-submit");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!window.Auth.isConfigured()) {
          App.showToast("認証の設定が完了していません。管理者にお問い合わせください。", "error");
          return;
        }

        const email = document.getElementById("email").value.trim();
        submitBtn.disabled = true;
        submitBtn.textContent = "送信中...";

        try {
          await Auth.resetPassword(email);
          App.showToast("再設定用のメールを送信しました");
          form.reset();
        } catch (err) {
          App.showToast(err.message || "送信に失敗しました", "error");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "再設定メールを送信";
        }
      });
    });
  </script>
</body>
</html>
